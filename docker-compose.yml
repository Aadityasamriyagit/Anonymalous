version: '3.9'
services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    ports:
      - '8080:8080'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - '6379:6379'

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
